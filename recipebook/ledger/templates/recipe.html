{% extends 'base.html' %}

{% block body %}
    <h2> Recipe Detail Page </h2>
    <h3> {{recipe.name}} by {{recipe.author}}</h3>
    <h4> Ingredients </h4>
    <ul>
        {% for ingredient in recipe.ingredients.all %}
            <li>{{ingredient.quantity}} {{ingredient.ingredient.name}}</li>
        {% endfor %}
    </ul>

    <p><a href='/recipes/list'> back to list </a></p>

{% endblock %}
