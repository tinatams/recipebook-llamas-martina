{% extends 'base.html' %}

{% block body %}
    <h2> {{recipe.name}} </h2>
    <h3> Ingredients </h3>
    <ul>
        {% for recipe_ingredient in recipe.recipe_ingredients.all %}
            <li>{{recipe_ingredient.quantity}} {{recipe_ingredient.ingredient.name}}</li>
        {% endfor %}
    </ul>

    <p><a href='/recipes/list'> link </a></p>

{% endblock %}
