{% extends 'base.html' %}

{% block body %}
    <h2>Recipe List</h2>
    <h3>Recipes: </h3>
    <ul>
        {% for recipe in recipes %}
            <li><a href={{recipe.get_absolute_url}}> {{recipe.name}}</a></li>
        {% endfor %}
    </ul>
    <a href="{% url 'ledger:recipe_add' %}">Make A New Recipe</a>
{% endblock %}
