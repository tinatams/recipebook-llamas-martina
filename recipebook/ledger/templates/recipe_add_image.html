{% extends 'base.html' %}

{% block body %}
    <h2>Add Image to A Recipe</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form }}
        <input type="submit" name="submit" value="Save Image Recipe"> 
    </form>

    <a href="{% url 'ledger:recipe_detail' pk=pk %}"> Back to Recipe</a>
{% endblock %}
